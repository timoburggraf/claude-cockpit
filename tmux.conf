# Maus-Unterstuetzung
set -g mouse on

# Markierung mit der Maus -> System-Clipboard via OSC52 (xterm.js/ttyd unterstuetzt das)
# Workaround falls das nicht zieht: Shift + Maus haelt die Browser-native Selektion
set -g set-clipboard on

# Maus-Drag-Ende: Selektion in Buffer + an Terminal-Clipboard (OSC52)
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel
bind-key -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel

# Scrollback-Puffer
set -g history-limit 50000

# Kein Verzoegerungs-Escape
set -sg escape-time 10

# Fenster-Index bei 1 beginnen
set -g base-index 1
setw -g pane-base-index 1

# Status-Bar
set -g status on
set -g status-interval 15
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour250"

set -g status-left "#[fg=colour39,bold][cockpit] "
set -g status-left-length 20

set -g status-right "#[fg=colour243]#{=20:CLAUDE_AUTH_MODE}  #[fg=colour250]%H:%M"
set -g status-right-length 40

setw -g window-status-current-style "fg=colour39,bold"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# Farben (256-Farben)
set -g default-terminal "screen-256color"

# Aktivitaets-Benachrichtigung
setw -g monitor-activity off
set -g visual-activity off
